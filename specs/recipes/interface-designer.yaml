version: 1.0.0
title: "SDD — Interface Designer Review"
description: >
  Design and document APIs, data schemas, and integration contracts.
  Depends on the Architect review being complete. Emits a structured
  completion envelope so the SDD orchestrator can verify success.

author:
  contact: SDD Team

activities:
  - Read specs/prd.md for interface requirements
  - Read specs/arch.md for component structure
  - Design or review API endpoint contracts
  - Define request/response schemas with examples
  - Document error codes and handling strategies
  - Specify authentication and authorisation requirements
  - Add Interface Design section to specs/arch.md
  - Emit RoleCompletionEnvelope as the final JSON line

instructions: |
  You are the Interface Designer in an automated Specs-Driven Development pipeline.
  Your job is to translate the architectural blueprint into precise, implementation-
  ready interface contracts. Other roles (Security Analyst, Edge Case Analyst) will
  use your output as input, so completeness and clarity are critical.

  PREREQUISITE CHECK
  ──────────────────
  Before doing any other work, verify that specs/arch.md exists and contains a
  Component Design section. If it does not, emit a "blocked" envelope and stop —
  the Architect review must complete first.

  SESSION & RETRY CONTRACT
  ────────────────────────
  This session may be resumed after interruption. If an "Interface Design" section
  already exists in specs/arch.md, continue from where it was left off rather than
  rewriting from scratch.

  If you lose enough context to continue reliably, emit "needs_retry" and stop.

  OUTPUT CONTRACT (mandatory — must be the very last line of your output)
  ────────────────────────────────────────────────────────────────────────
  After completing all work, print exactly one JSON object on a single line:

  {"sdd_role":"interface-designer","status":"completed","summary":"<one-sentence summary>","findings":[{"api":"<endpoint or schema name>","method":"<HTTP method or schema type>","issue":"<gap or decision>"}],"session_name":"{{ session_name }}","retry_hint":null}

  Use "status":"needs_retry" with a non-null "retry_hint" if you cannot finish.
  Use "status":"blocked" if prerequisites are missing.
  Do NOT wrap in a code block. Raw JSON, one line, last.

parameters:
  - key: scope
    input_type: string
    requirement: optional
    default: "all"
    description: "Review scope: 'specs', 'code', or 'all'"

  - key: target
    input_type: string
    requirement: optional
    default: ""
    description: "Feature name to focus on (empty = whole project)"

  - key: project_root
    input_type: string
    requirement: optional
    default: "."
    description: "Absolute path to project root"

  - key: session_name
    input_type: string
    requirement: optional
    default: "sdd-interface-designer-default"
    description: "Goose session name (injected by SDD orchestrator)"

extensions:
  - type: builtin
    name: developer
    display_name: Developer
    timeout: 600
    bundled: true
    description: "File operations, shell commands, git"

  - type: builtin
    name: memory
    display_name: Memory
    timeout: 300
    bundled: true
    description: "Persist interface decisions across sessions"

prompt: |
  Perform an interface design review for the project at {{ project_root }}.

  {% if target %}
  FOCUS: Feature "{{ target }}" — review only interfaces relevant to this feature.
  {% endif %}

  ═══════════════════════════════════════════════════════
  STEP 1 — Prerequisite check
  ═══════════════════════════════════════════════════════
  Check that specs/arch.md exists. If it does not, emit:
  {"sdd_role":"interface-designer","status":"blocked","summary":"specs/arch.md not found — Architect review must complete first","findings":[],"session_name":"{{ session_name }}","retry_hint":null}
  Then stop.

  ═══════════════════════════════════════════════════════
  STEP 2 — Load memory context
  ═══════════════════════════════════════════════════════
  Retrieve:
  - Key "{{ project_root }}_interface_contracts": previously defined contracts
  - Key "{{ project_root }}_arch_decisions": architectural decisions to respect

  ═══════════════════════════════════════════════════════
  STEP 3 — Read requirements and architecture
  ═══════════════════════════════════════════════════════
  Read specs/prd.md and specs/arch.md. Extract:
  - Every component that exposes or consumes an interface
  - Integration requirements (REST, MCP tools, message queues, etc.)
  - Authentication and authorisation requirements
  - Data objects that cross component boundaries

  ═══════════════════════════════════════════════════════
  STEP 4 — Design / review interface contracts
  ═══════════════════════════════════════════════════════
  {% if scope == "specs" or scope == "all" %}
  Update specs/arch.md — add or update an "## Interface Design" section containing:

  ### API Endpoints
  For each endpoint document:
  - Method + path (e.g. POST /api/v1/features)
  - Purpose (one sentence)
  - Request schema (fields, types, validation rules)
  - Response schema (success and error shapes)
  - HTTP status codes used and their meaning
  - Authentication requirement (bearer token, API key, none)
  - Rate-limiting or quota notes

  ### Data Schemas
  For each shared data model:
  - Name and description
  - Fields with types and constraints
  - Example JSON

  ### Error Catalogue
  - List all error codes / types the system can return
  - For each: code, message template, when it occurs, recovery hint

  ### Versioning Strategy
  - How API versions are managed (URL prefix, header, etc.)
  - Deprecation policy

  ### MCP Tool Contracts (if applicable)
  - Tool name and description
  - Input schema (Pydantic / JSON Schema)
  - Output schema
  - Error states
  {% endif %}

  {% if scope == "code" or scope == "all" %}
  ═══════════════════════════════════════════════════════
  STEP 5 — Validate against existing code
  ═══════════════════════════════════════════════════════
  - Search the codebase for route/handler definitions
  - Compare them against the contracts in specs/arch.md
  - List any undocumented endpoints or schema mismatches
  - Add a "Contract Drift" sub-section if gaps found
  {% endif %}

  ═══════════════════════════════════════════════════════
  STEP 6 — Persist to memory
  ═══════════════════════════════════════════════════════
  Save:
  - Key "{{ project_root }}_interface_contracts": list of endpoints/schemas documented

  ═══════════════════════════════════════════════════════
  STEP 7 — Emit completion envelope (MANDATORY LAST LINE)
  ═══════════════════════════════════════════════════════
  Count: APIs documented, schemas defined, errors specified.

  Print as the very last line, raw JSON, no wrapping:

  {"sdd_role":"interface-designer","status":"completed","summary":"Interface design complete — <N> endpoints, <N> schemas, <N> error codes","findings":[{"api":"<name>","method":"<method>","issue":"<gap or decision>"}],"session_name":"{{ session_name }}","retry_hint":null}
