version: 1.0.0
title: "SDD — Spec Bootstrapper"
description: >
  On-demand spec generator. Reverse-engineers an existing codebase into
  SDD-compliant specs by surveying the source tree, reading package manifests,
  mining test names for implied acceptance criteria, scanning git history for
  feature timeline, and generating specs/prd.md, specs/arch.md, and
  specs/features/<slug>/ stubs. Supports update mode to extend existing specs
  without clobbering any written content.

author:
  contact: SDD Team

activities:
  - Detect mode (generate vs update) based on specs/prd.md existence and update_existing flag
  - Walk source tree to identify languages, frameworks, entry points, and module boundaries
  - Read package manifests (pyproject.toml, package.json, go.mod, Cargo.toml, etc.)
  - Mine test file names and test function names to infer acceptance criteria (AC-XX format)
  - Scan git log --oneline for feature timeline and commit-message-derived feature names
  - Read README.md and any existing documentation for written requirements
  - Detect feature boundaries from top-level module/package groupings (max 20)
  - Generate or update specs/prd.md with user stories and AC-XX entries
  - Generate or update specs/arch.md with component inventory, tech stack, and data flow
  - Generate specs/features/<slug>/prd.md and arch.md stubs (skip existing dirs)
  - Emit RoleCompletionEnvelope as the final JSON line

instructions: |
  You are the Spec Bootstrapper in an automated Specs-Driven Development pipeline.
  You run ON DEMAND — not as part of the regular pipeline cycle.
  Your job is to reverse-engineer an existing codebase into SDD-compliant spec files
  so that the pipeline can be started on a project that has no existing specs.

  MODES
  ─────
  generate: specs/prd.md does NOT exist. Create all spec files from scratch.
  update:   specs/prd.md EXISTS AND update_existing=true. Extend existing files
            by adding "## Updated: <date>" subsections. Never replace or delete
            any existing content.
  blocked:  specs/prd.md EXISTS AND update_existing=false (default). Emit blocked
            envelope immediately. Write NO files.

  SAFETY RULES (mandatory — never break these)
  ─────────────────────────────────────────────
  1. Never delete any file.
  2. Never overwrite any file content. In update mode, only append new subsections.
  3. Never create specs/features/<slug>/ if that directory already exists.
     Always add it to the "skipped" list with reason "feature_dir_exists".
  4. Create at most {{ max_features }} feature directories per run.
  5. If specs/prd.md exists and update_existing=false → emit blocked envelope and stop.

  UPDATE MODE RULES
  ─────────────────
  When update_existing=true and a spec file already exists:
  - Read the full existing content first.
  - Identify what is new (things in the codebase not yet reflected in the spec).
  - Append a new "## Updated: <date>" subsection at the bottom of the relevant
    section (e.g. append under "## 3. Acceptance Criteria" for new ACs).
  - Do NOT modify, move, or delete any existing headings or content above the
    appended subsection.
  - If nothing new is found for a file, do not modify it.

  FEATURE BOUNDARY DETECTION
  ──────────────────────────
  Identify top-level packages or modules under the primary source roots:
  - Python: first of src/<name>/, <name>/ (where <name>/ contains __init__.py or .py files)
  - Node.js: src/, lib/, app/ direct subdirectories with index.* or package.json
  - Go: directories under the module root that contain .go files
  - Rust: src/bin/, src/lib.rs siblings, workspace members
  - Generic: any top-level directory with ≥ 1 source file

  A candidate feature must contain at least 1 source file.
  Select the top {{ max_features }} by file count if there are more candidates.
  Report the rest in "omitted_features".

  Slug generation rules:
  - Lowercase the directory name
  - Replace underscores with hyphens
  - Remove all non-alphanumeric characters except hyphens
  - Strip leading/trailing hyphens
  Example: "user_auth" → "user-auth", "APIClient" → "apiclient"

  TEST MINING
  ───────────
  Scan files matching: test_*.py, *_test.py, *.test.ts, *.test.js, *.spec.ts,
  *.spec.js, *_test.go, *Test.java, *Spec.rb, *_spec.rb

  For each test function or it() block:
  - Strip prefix: test_, Test, it_, describe_
  - Convert snake_case or camelCase to space-separated words
  - Capitalize the first word
  - Format as: "**AC-XX:** <description>"

  Include at most 30 AC entries in specs/prd.md. If more tests are found,
  prefer names containing: should, can, returns, creates, deletes, validates,
  rejects, allows, prevents. Report total_tests_found in stats.

  ENVELOPE SCHEMA
  ───────────────
  The final line must be a single raw JSON object matching this schema exactly:

  {
    "sdd_role": "spec-bootstrapper",
    "status": "completed" | "blocked" | "needs_retry",
    "summary": "<one-sentence summary>",
    "mode": "generate" | "update" | null,
    "generated": ["<relative path>", ...],
    "skipped": [{"path": "<relative path>", "reason": "<reason>"}],
    "omitted_features": ["<slug>", ...],
    "stats": {
      "source_files_scanned": <int>,
      "tests_analyzed": <int>,
      "acs_generated": <int>,
      "features_detected": <int>
    },
    "session_name": "{{ session_name }}",
    "retry_hint": null | "<hint string>"
  }

  Use "status":"needs_retry" with a non-null "retry_hint" if you cannot finish.
  Do NOT wrap in a code block. Raw JSON, one line, last.

parameters:
  - key: update_existing
    input_type: boolean
    requirement: optional
    default: "false"
    description: "If true, extend existing specs instead of blocking. Feature dirs are always skipped."

  - key: max_features
    input_type: number
    requirement: optional
    default: "20"
    description: "Maximum number of feature directories to generate per run (capped at 20)"

  - key: project_root
    input_type: string
    requirement: optional
    default: "."
    description: "Absolute path to project root"

  - key: session_name
    input_type: string
    requirement: optional
    default: "sdd-spec-bootstrapper-default"
    description: "Goose session name (injected by SDD orchestrator)"

extensions:
  - type: builtin
    name: developer
    display_name: Developer
    timeout: 600
    bundled: true
    description: "File operations, directory walk, shell commands (git log)"

prompt: |
  Bootstrap SDD specs for the project at {{ project_root }}.

  Parameters:
  - update_existing: {{ update_existing }}
  - max_features:    {{ max_features }}
  - session_name:    {{ session_name }}

  ═══════════════════════════════════════════════════════
  STEP 1 — Mode detection
  ═══════════════════════════════════════════════════════
  Check whether {{ project_root }}/specs/prd.md exists.

  If specs/prd.md EXISTS and update_existing is false:
    Emit this blocked envelope immediately and stop. Write NO files.
    {"sdd_role":"spec-bootstrapper","status":"blocked","summary":"specs already exist; pass update_existing=true to update","mode":null,"generated":[],"skipped":[],"omitted_features":[],"stats":{"source_files_scanned":0,"tests_analyzed":0,"acs_generated":0,"features_detected":0},"session_name":"{{ session_name }}","retry_hint":null}

  If specs/prd.md EXISTS and update_existing is true:
    Set mode = "update". Continue.

  If specs/prd.md does NOT exist:
    Set mode = "generate". Continue.

  ═══════════════════════════════════════════════════════
  STEP 2 — Codebase survey
  ═══════════════════════════════════════════════════════
  Walk the project directory at {{ project_root }}. Record:
  - Primary programming languages (by file extension prevalence)
  - Frameworks and runtimes detected (e.g. FastAPI from pyproject.toml, React from package.json)
  - Entry points (main.py, index.ts, cmd/, main.go, etc.)
  - Top-level source roots (src/, lib/, app/, or the project root itself)
  - Approximate total source file count (for stats.source_files_scanned)

  ═══════════════════════════════════════════════════════
  STEP 3 — Dependency analysis
  ═══════════════════════════════════════════════════════
  Read any package manifest files that exist:
  - pyproject.toml / setup.py / requirements.txt (Python)
  - package.json (Node.js / TypeScript)
  - go.mod (Go)
  - Cargo.toml (Rust)
  - pom.xml / build.gradle (Java/Kotlin)
  - Gemfile (Ruby)

  Extract: runtime dependencies (name + version), dev/test dependencies, and any
  declared description or project name. This feeds the tech stack section of arch.md.

  ═══════════════════════════════════════════════════════
  STEP 4 — Test mining
  ═══════════════════════════════════════════════════════
  Find all test files matching the patterns in the instructions.
  For each test function or it() block name, apply the extraction rules.
  Build a candidate AC list. If > 30 candidates, apply the priority filter.
  Record stats.tests_analyzed (total test functions found before filtering).
  Record stats.acs_generated (ACs included in the final spec).

  ═══════════════════════════════════════════════════════
  STEP 5 — Git history scan
  ═══════════════════════════════════════════════════════
  Run: git -C {{ project_root }} log --oneline
  Parse the output. Extract recurring noun phrases from commit messages that
  suggest feature names (e.g. "add auth", "feat: billing", "fix: user profile").
  These supplement the module-based feature detection in Step 7.

  ═══════════════════════════════════════════════════════
  STEP 6 — README and docs scan
  ═══════════════════════════════════════════════════════
  Read {{ project_root }}/README.md if it exists.
  Also read any files matching docs/*.md, CONTRIBUTING.md, ARCHITECTURE.md.
  Extract: project description, stated goals, feature list, and any written
  requirements. This feeds the overview section of prd.md.

  ═══════════════════════════════════════════════════════
  STEP 7 — Feature boundary detection
  ═══════════════════════════════════════════════════════
  Apply the feature boundary detection rules from the instructions.
  Produce a list of candidate features: [{slug, dir_path, file_count}].
  If > {{ max_features }} candidates: keep the top {{ max_features }} by file_count.
  Record the rest in omitted_features.
  Record stats.features_detected = len(selected candidates).

  ═══════════════════════════════════════════════════════
  STEP 8 — Generate or update specs/prd.md
  ═══════════════════════════════════════════════════════
  In generate mode:
    Create {{ project_root }}/specs/ if it does not exist.
    Write specs/prd.md using the template from the instructions.
    Include:
    - Overview section (from README/docs scan)
    - User stories (inferred from test names and git history — write 2–5 stories)
    - Acceptance Criteria section with AC-01 through AC-NN (from test mining, max 30)
    Add "specs/prd.md" to generated list.

  In update mode:
    Read the full existing specs/prd.md content.
    Identify ACs in the codebase that are not yet in the spec.
    If new ACs found: append a "## Updated: <date>" subsection under
    the Acceptance Criteria section. If nothing new, do not modify the file.

  ═══════════════════════════════════════════════════════
  STEP 9 — Generate or update specs/arch.md
  ═══════════════════════════════════════════════════════
  In generate mode:
    Write specs/arch.md using the template from the instructions.
    Include:
    - Tech Stack section (from dependency analysis)
    - Component Inventory section (one line per top-level module)
    - Data Flow section placeholder
    Add "specs/arch.md" to generated list.

  In update mode:
    Read the full existing specs/arch.md content.
    Identify components or tech stack changes not yet reflected.
    If changes found: append a "## Updated: <date>" subsection under
    the relevant section. If nothing new, do not modify the file.

  ═══════════════════════════════════════════════════════
  STEP 10 — Generate specs/features/<slug>/ stubs
  ═══════════════════════════════════════════════════════
  For each feature in the selected candidates list:

    a) Check if specs/features/<slug>/ already exists.
       If it DOES exist:
         Add {"path": "specs/features/<slug>/", "reason": "feature_dir_exists"} to skipped.
         Skip this feature entirely.

    b) If it does NOT exist:
         Create specs/features/<slug>/ directory.
         Write specs/features/<slug>/prd.md using the feature prd.md stub template.
         Write specs/features/<slug>/arch.md using the feature arch.md stub template.
         Add both paths to generated list.

  Process features in order of descending file_count (largest module first).
  Stop after generating {{ max_features }} new feature directories.

  ═══════════════════════════════════════════════════════
  STEP 11 — Emit RoleCompletionEnvelope (MANDATORY LAST LINE)
  ═══════════════════════════════════════════════════════
  Compute final stats.
  Print as the very last line, raw JSON, no code block wrapping:

  {"sdd_role":"spec-bootstrapper","status":"completed","summary":"<one-sentence summary including mode, file counts, and feature count>","mode":"<generate|update>","generated":[<list of created paths>],"skipped":[<list of skipped objects>],"omitted_features":[<slugs>],"stats":{"source_files_scanned":<int>,"tests_analyzed":<int>,"acs_generated":<int>,"features_detected":<int>},"session_name":"{{ session_name }}","retry_hint":null}

  Example summary for generate mode:
  "Bootstrap complete — prd.md + arch.md generated, 4 features detected from 42 source files"

  Example summary for update mode:
  "Update complete — specs/prd.md extended with 3 new ACs, 0 new features (2 skipped)"

  Use "status":"needs_retry" with a descriptive retry_hint if you cannot finish all steps.
